name: update data

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      password:
        description: "update password"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify password
        if: github.event_name == 'workflow_dispatch'
        run: |
          INPUT_HASH=$(printf "%s" "${{ inputs.password }}" | sha256sum | awk '{print $1}')
          EXPECTED_HASH="${{ secrets.PASSWORD }}"

          if [ "$INPUT_HASH" != "$EXPECTED_HASH" ]; then
            echo "Wrong password"
            exit 1
          fi

      - name: Run script (python handles webhook)
        run: python flashmaker.py
        env:
          WEBHOOK: ${{ secrets.webhook }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add memory_flash.py

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto: update memory flash"
          git push
