name: update data

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python flashmaker.py
        env:
          WEBHOOK: ${{ secrets.webhook }}

      - name: Debug output
        run: |
          echo "==== memory_flash.py ===="
          cat memory_flash.py || echo "file missing"

      - name: Commit + notify
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add memory_flash.py
          if git diff --cached --quiet; then
            echo "No changes"

            curl -X POST $WEBHOOK \
            -H "Content-Type: application/json" \
            -d '{"content": "nothing changed"}'
          else
            git commit -m "auto: update memory flash"
            git push

            curl -X POST $WEBHOOK \
            -F "content=memory updated" \
            -F "file=@memory_flash.py"
          fi
        env:
          WEBHOOK: ${{ secrets.webhook }}
