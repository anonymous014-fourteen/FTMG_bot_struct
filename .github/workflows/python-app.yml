- name: Commit + notify
  run: |
    git config user.name "github-actions"
    git config user.email "github-actions@github.com"

    git add memory_flash.py

    if git diff --cached --quiet; then
      echo "No changes"

      curl -X POST $WEBHOOK \
      -H "Content-Type: application/json" \
      -d '{"content": "nothing changed"}'

      exit 0
    fi

    git commit -m "auto: update memory flash"
    git push

    curl -X POST $WEBHOOK \
      -F "content=memory updated" \
      -F "file=@memory_flash.py"
  env:
    WEBHOOK: ${{ secrets.webhook }}
